<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Santosh Grand Rounds</title>
  <style>
    :root {
      --blue: #0057d9;
      --border: #d0d0d0;
      --user-bg: #e6ffe6;
      --resident-bg: #eef4ff;
      --consultant-bg: #fff0e6;
      --radius: 12px;
    }

    * {
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      margin: 0;
      display: flex;
      flex-direction: column;
      height: 100vh;
      background: #fafafa;
    }

    header {
      padding: 0.6rem 1rem;
      border-bottom: 1px solid var(--border);
      color: var(--blue);
      font-weight: 700;
      font-size: 1.1rem;
      text-align: center;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      padding: 0.6rem 1rem;
      background: #fff;
      border-bottom: 1px solid var(--border);
    }

    .controls input,
    .controls select,
    .controls button {
      flex: 1 1 150px;
      padding: 0.45rem 0.6rem;
      font-size: 0.95rem;
      border: 1px solid var(--border);
      border-radius: var(--radius);
    }

    .controls button {
      background: var(--blue);
      color: #fff;
      cursor: pointer;
      flex: 0 0 auto;
    }

    #chat {
      flex: 1 1 auto;
      overflow-y: auto;
      padding: 1rem;
      display: flex;
      flex-direction: column;
    }

    .msg {
      max-width: 85%;
      margin-bottom: 0.8rem;
      padding: 0.6rem 0.8rem;
      border-radius: var(--radius);
      line-height: 1.35;
      word-wrap: break-word;
      background: #fff;
    }

    .user {
      align-self: flex-end;
      background: var(--user-bg);
    }

    .resident {
      background: var(--resident-bg);
      color: #002c71;
    }

    .consultant {
      background: var(--consultant-bg);
      color: #702c00;
    }

    footer {
      padding: 0.4rem;
      text-align: center;
      font-size: 0.8rem;
      color: var(--blue);
    }

    pre {
      overflow-x: auto;
    }

    code {
      font-family: Consolas, Monaco, monospace;
    }
  </style>
</head>
<body>
  <header>SMC Department Of Medicine Agentic Grand Rounds</header>
  
  
  <section class="controls" id="topControls">
    <input id="apiKey" type="password" placeholder="Enter Your Code" />
    <select id="residentModel">
      <option disabled selected>Resident model</option>
      <option value="deepseek/deepseek-v3.2">Deep Seek 3.2</option>
      
      <option value="google/gemini-3-flash-preview">Gemini 3.0 Flash</option>
      <option value="minimax/minimax-m2.7">Mini Max 2.7</option>
    </select>

    <select id="consultantModel">
      <option disabled selected>Consultant model</option>
      <option value="moonshotai/kimi-k2.5">Kimi K 2.5 </option>
      <option value="x-ai/grok-4.20">Grok 4.2</option>
      <option value="openai/gpt-5.4">GPT 5.4</option>
    </select>

    <select id="expertModel">
      <option disabled selected>Expert model</option>
      <option value="google/gemini-3.1-pro-preview">Gemini 3.1 pro</option>
      <option value="openai/gpt-5.4">GPT 5.4</option>
      <option value="x-ai/grok-4.20">Grok 4.20</option>
    </select>

    <button id="clear">Clear</button>
    <button id="download">Download Chat</button>
  </section>
  

  

  <section id="chat"></section>

  <section class="controls" id="inputControls" style="border-top: 1px solid var(--border);">
    <input id="prompt" type="text" placeholder="Type your message…" autocomplete="off" />
    <button id="send">Send</button>
  </section>

  <footer>Coded by Anupam Singh MD</footer>

  <script>
    function markdownToHTML(src) {
      if (!src) return '';

      let text = src
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');

      text = text.replace(/```([\s\S]*?)```/g, (_, code) => {
        return '<pre><code>' + code + '</code></pre>';
      });

      text = text.replace(/`([^`]+)`/g, '<code>$1</code>');

      text = text.replace(/^######\s+(.+)$/gm, '<h6>$1</h6>');
      text = text.replace(/^#####\s+(.+)$/gm, '<h5>$1</h5>');
      text = text.replace(/^####\s+(.+)$/gm, '<h4>$1</h4>');
      text = text.replace(/^###\s+(.+)$/gm, '<h3>$1</h3>');
      text = text.replace(/^##\s+(.+)$/gm, '<h2>$1</h2>');
      text = text.replace(/^#\s+(.+)$/gm, '<h1>$1</h1>');

      text = text.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
      text = text.replace(/\*([^*]+)\*/g, '<em>$1</em>');

      text = text.replace(/^[-*]\s+(.+)$/gm, '<li>$1</li>');
      text = text.replace(/(<li>[\s\S]*?<\/li>)/g, (m) => {
        return /<ul>/m.test(m) ? m : '<ul>' + m + '</ul>';
      });

      text = text.replace(/\n\n/g, '<br><br>');
      return text;
    }

    const RESIDENT_PROMPT = `
You are the Resident in a staged clinical teaching round for postgraduate medicine trainees.

Your role:
- Think like a good but imperfect senior resident.
- You must commit to a working diagnosis early.
- You may be wrong, but your reasoning should be clinically plausible.
- Do not try to sound like the final expert.
- Focus on prioritization, bedside thinking, and immediate next steps.

Task:
Given the current stage of a case, respond in a way that helps residents learn active clinical reasoning.

Output format:

Resident:
1. Most likely diagnosis right now (one line)
2. Top 3 differentials (brief)
3. Most dangerous diagnosis not to miss (one line)
4. Key findings driving your thinking (3–5 bullets)
5. Best next bedside step or investigation (maximum 3 items)
6. What would make you change your mind? (1–2 lines)

Rules:
- Keep total length 150–220 words.
- Do not give exhaustive textbook lists.
- Do not provide treatment beyond immediate priorities unless directly relevant.
- Do not use confidence percentages.
- Sound like a resident presenting on rounds.
- Show uncertainty honestly.
- Avoid repeating all case details; only use the most relevant data.
- If there is a conflict in the data, mention it clearly.

Tone:
Concise, clinically alert, and teachable.
`;

    const CONSULTANT_PROMPT = `
You are the Consultant in a staged clinical teaching round for postgraduate medicine trainees.

Your role:
- Critique the resident's reasoning.
- Identify anchoring, missed priorities, unsafe assumptions, and incorrect sequencing.
- Do not repeat the whole case.
- Do not give a full independent essay unless needed.
- Your job is to sharpen judgment, not to summarize.

Task:
Review the current case stage and the Resident response. Then provide focused consultant feedback.

Output format:

Consultant:
1. What the resident got right (2–3 lines). your top 3 differentials in one line.
2. What is weak, unsafe, or premature in the reasoning (3–5 bullets)
3. The single biggest diagnostic or management priority right now (one line)
4. One dangerous alternative diagnosis that must stay open (one line)
5. Immediate refinement to plan (maximum 3 action points)
6. Teaching correction (1 short paragraph)

Rules:
- Keep total length 140-220 words.
- Challenge the resident where needed.
- Prioritize bedside danger over academic completeness.
- Do not produce a huge differential list.
- Do not use artificial numbers like “reduces risk from 25% to 5%.”
- Avoid sounding like the final expert.
- Focus on what should change now.

Tone:
Sharp, practical, supervisory, and slightly corrective.
`;

    const EXPERT_PROMPT = `
You are the Expert Discussant in a staged clinical teaching round for medicine residents.

Your role:
- Give the highest-yield synthesis after hearing the case stage and the prior reasoning.
- Explain the pattern clearly.
- Show why certain differentials rise or fall.
- Deliver the main teaching point.
- You are not here to repeat the resident or consultant in different words.

Task:
Using the current case stage plus the Resident and Consultant responses, provide the expert synthesis.

Output format:

Expert:
1. Best unifying diagnosis at this stage (one line) .your top 3 differentials in a sentence 
2. Why this diagnosis fits best (3–5 focused bullets)
3. Why the main alternatives are less likely (2–4 bullets)
4. What clinical pivot changed the case if applicable (1 short paragraph)
5. Most important next diagnostic or management move (1–3 lines)
6. Teaching pearl (one memorable line)


Rules:
- Keep total length 140–220 words.
- Emphasize pattern recognition and pivot points.
- Do not simply repeat prior content.
- Mention uncertainty if the diagnosis is still provisional.
- Prefer clinical localization and syndrome recognition where relevant.
- Avoid very long management protocols unless absolutely central.

Tone:
Clear, high-yield, authoritative, and elegant.
`;

    const chatDiv = document.getElementById('chat');
    const promptBox = document.getElementById('prompt');
    const sendBtn = document.getElementById('send');
    const clearBtn = document.getElementById('clear');
    const downloadBtn = document.getElementById('download');

    let history = [];
    let transcript = [];

    function addMessage(role, text, cls) {
      const div = document.createElement('div');
      div.className = 'msg ' + cls;
      div.innerHTML = '<strong>' + role + ':</strong> ' + markdownToHTML(text);
      chatDiv.appendChild(div);
      chatDiv.scrollTop = chatDiv.scrollHeight;
      transcript.push({ label: role, text });
    }

    function createStreamingContainer(role, cls) {
      const div = document.createElement('div');
      div.className = 'msg ' + cls;

      const strong = document.createElement('strong');
      strong.textContent = role + ': ';
      div.appendChild(strong);

      const span = document.createElement('span');
      div.appendChild(span);

      chatDiv.appendChild(div);
      chatDiv.scrollTop = chatDiv.scrollHeight;

      transcript.push({ label: role, text: '' });
      return { span, index: transcript.length - 1 };
    }

    function appendStreamChunk(obj, chunk) {
      obj.span.textContent += chunk;
      chatDiv.scrollTop = chatDiv.scrollHeight;
      transcript[obj.index].text += chunk;
    }

    function finaliseStream(obj) {
      obj.span.innerHTML = markdownToHTML(obj.span.textContent);
    }

    async function generateStream(rolePrompt, model, apiKey, roleLabel, cssClass) {
      const streamObj = createStreamingContainer(roleLabel, cssClass);

      const payload = {
        model: model,
        stream: true,
        messages: [
          { role: 'system', content: rolePrompt },
          ...history
        ]
      };

      try {
        const res = await fetch('https://openrouter.ai/api/v1/chat/completions', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + apiKey
          },
          body: JSON.stringify(payload)
        });

        if (!res.ok) {
          appendStreamChunk(streamObj, '\nError: ' + res.status + ' ' + res.statusText);
          finaliseStream(streamObj);
          return;
        }

        if (!res.body) {
          appendStreamChunk(streamObj, '\nError: No response body');
          finaliseStream(streamObj);
          return;
        }

        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';
        let finalText = '';

        try {
          while (true) {
            const { value, done } = await reader.read();
            if (done) break;

            buffer += decoder.decode(value, { stream: true });
            const lines = buffer.split('\n');
            buffer = lines.pop() || '';

            for (const line of lines) {
              const trimmedLine = line.trim();
              if (!trimmedLine || !trimmedLine.startsWith('data:')) continue;

              const dataStr = trimmedLine.slice(5).trim();
              if (!dataStr || dataStr === '[DONE]') continue;

              try {
                const json = JSON.parse(dataStr);
                const delta = json.choices?.[0]?.delta?.content || '';
                if (delta) {
                  finalText += delta;
                  appendStreamChunk(streamObj, delta);
                }
              } catch (parseError) {
                console.warn('Chunk parse error:', parseError);
              }
            }
          }
        } catch (streamError) {
          appendStreamChunk(streamObj, '\nStream error: ' + streamError.message);
        }

        finaliseStream(streamObj);
        history.push({ role: 'assistant', content: finalText });
      } catch (error) {
        appendStreamChunk(streamObj, '\nRequest error: ' + error.message);
        finaliseStream(streamObj);
      }
    }

    async function send() {
      const apiKey = document.getElementById('apiKey').value.trim();
      if (!apiKey) {
        alert('Enter API key');
        return;
      }

      const residentModel = document.getElementById('residentModel').value;
      const consultantModel = document.getElementById('consultantModel').value;
      const expertModel = document.getElementById('expertModel').value;

      if (!residentModel || !consultantModel || !expertModel) {
        alert('Please select resident, consultant, and expert models');
        return;
      }

      const userText = promptBox.value.trim();
      if (!userText) return;

      addMessage('User', userText, 'user');
      history.push({ role: 'user', content: userText });
      promptBox.value = '';

      try {
        await generateStream(RESIDENT_PROMPT, residentModel, apiKey, 'Resident', 'resident');
        await generateStream(CONSULTANT_PROMPT, consultantModel, apiKey, 'Attending', 'consultant');
        await generateStream(EXPERT_PROMPT, expertModel, apiKey, 'Expert', 'consultant');
      } catch (err) {
        addMessage('System', 'Error: ' + err.message, 'consultant');
      }
    }

    function downloadChat() {
      if (transcript.length === 0) {
        alert('No chat to download');
        return;
      }

      const text = transcript.map((t) => `${t.label}: ${t.text}`).join('\n\n');
      const blob = new Blob([text], { type: 'text/plain' });
      const url = URL.createObjectURL(blob);

      const a = document.createElement('a');
      a.href = url;
      a.download = 'resident_consultant_expert_chat.txt';
      document.body.appendChild(a);
      a.click();
      a.remove();

      URL.revokeObjectURL(url);
    }

    sendBtn.onclick = send;

    promptBox.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        send();
      }
    });

    downloadBtn.onclick = downloadChat;

    clearBtn.onclick = () => {
      history = [];
      transcript = [];
      chatDiv.innerHTML = '';
      promptBox.value = '';
    };
  </script>
</body>
</html>
