<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>BPROAD Trial Critical Appraisal</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #11100e;
      --panel: #1f1d1a;
      --ink: #f7f4ec;
      --muted: #c9c1b3;
      --line: #4b453d;
      --accent: #b31b1b;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--ink);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .app {
      display: grid;
      grid-template-rows: auto 1fr auto;
      width: 100vw;
      height: 100vh;
    }
    header, footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem;
      padding: 0.55rem 0.75rem;
      background: rgba(31, 29, 26, 0.96);
      border-color: var(--line);
      font-size: 0.92rem;
    }
    header { border-bottom: 1px solid var(--line); }
    footer { border-top: 1px solid var(--line); }
    .title {
      min-width: 0;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
      font-weight: 700;
    }
    .counter {
      color: var(--muted);
      white-space: nowrap;
    }
    .home-link {
      border: 1px solid var(--line);
      border-radius: 6px;
      color: var(--ink);
      font-weight: 700;
      padding: 0.28rem 0.55rem;
      text-decoration: none;
      white-space: nowrap;
    }
    .home-link:hover {
      border-color: var(--accent);
      color: white;
    }
    .stage {
      position: relative;
      min-height: 0;
      display: grid;
      place-items: center;
      padding: 0.5rem;
    }
    #slideImage {
      display: block;
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      background: #f7f4ec;
      box-shadow: 0 12px 36px rgba(0, 0, 0, 0.42);
    }
    button {
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #292520;
      color: var(--ink);
      min-height: 2.2rem;
      padding: 0.4rem 0.7rem;
      font: inherit;
      cursor: pointer;
    }
    button:disabled {
      opacity: 0.35;
      cursor: default;
    }
    button.primary {
      border-color: var(--accent);
      background: var(--accent);
      color: white;
      font-weight: 700;
    }
    .controls, .jump {
      display: flex;
      align-items: center;
      gap: 0.45rem;
    }
    input[type="range"] {
      width: min(46vw, 520px);
      accent-color: var(--accent);
    }
    input[type="number"] {
      width: 4.2rem;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #141210;
      color: var(--ink);
      padding: 0.38rem 0.45rem;
      font: inherit;
    }
    .nav-hit {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 24%;
      border: 0;
      background: transparent;
      padding: 0;
      opacity: 0;
    }
    .nav-hit.left { left: 0; }
    .nav-hit.right { right: 0; }
    .hint {
      color: var(--muted);
      font-size: 0.78rem;
    }
    @media (max-width: 760px) {
      header, footer {
        flex-wrap: wrap;
        font-size: 0.82rem;
      }
      .title {
        flex-basis: 100%;
      }
      .hint {
        display: none;
      }
      input[type="range"] {
        width: 46vw;
      }
      .stage {
        padding: 0;
      }
      #slideImage {
        box-shadow: none;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div class="title">BPROAD Trial Critical Appraisal</div>
      <a class="home-link" href="journalclub.html">Journal Club</a>
      <div class="counter" id="counter"></div>
    </header>
    <main class="stage" id="stage">
      <button class="nav-hit left" id="leftHit" aria-label="Previous slide"></button>
      <img id="slideImage" alt="Slide image">
      <button class="nav-hit right" id="rightHit" aria-label="Next slide"></button>
    </main>
    <footer>
      <div class="controls">
        <button id="prev" type="button">Previous</button>
        <button id="next" class="primary" type="button">Next</button>
        <button id="fullscreen" type="button">Fullscreen</button>
      </div>
      <div class="jump">
        <input id="slider" type="range" min="1" max="43" value="1">
        <input id="number" type="number" min="1" max="43" value="1">
      </div>
      <div class="hint">Keys: Left/Right, PageUp/PageDown, Home/End</div>
    </footer>
  </div>
  <script>
    const slides = ["NEJMoa2412006_BPROAD_Appraisal_Slide_Images_Soffice/slide-01.png", "NEJMoa2412006_BPROAD_Appraisal_Slide_Images_Soffice/slide-02.png", "NEJMoa2412006_BPROAD_Appraisal_Slide_Images_Soffice/slide-03.png", "NEJMoa2412006_BPROAD_Appraisal_Slide_Images_Soffice/slide-04.png", "NEJMoa2412006_BPROAD_Appraisal_Slide_Images_Soffice/slide-05.png", "NEJMoa2412006_BPROAD_Appraisal_Slide_Images_Soffice/slide-06.png", "NEJMoa2412006_BPROAD_Appraisal_Slide_Images_Soffice/slide-07.png", "NEJMoa2412006_BPROAD_Appraisal_Slide_Images_Soffice/slide-08.png", "NEJMoa2412006_BPROAD_Appraisal_Slide_Images_Soffice/slide-09.png", "NEJMoa2412006_BPROAD_Appraisal_Slide_Images_Soffice/slide-10.png", "NEJMoa2412006_BPROAD_Appraisal_Slide_Images_Soffice/slide-11.png", "NEJMoa2412006_BPROAD_Appraisal_Slide_Images_Soffice/slide-12.png", "NEJMoa2412006_BPROAD_Appraisal_Slide_Images_Soffice/slide-13.png", "NEJMoa2412006_BPROAD_Appraisal_Slide_Images_Soffice/slide-14.png", "NEJMoa2412006_BPROAD_Appraisal_Slide_Images_Soffice/slide-15.png", "NEJMoa2412006_BPROAD_Appraisal_Slide_Images_Soffice/slide-16.png", "NEJMoa2412006_BPROAD_Appraisal_Slide_Images_Soffice/slide-17.png", "NEJMoa2412006_BPROAD_Appraisal_Slide_Images_Soffice/slide-18.png", "NEJMoa2412006_BPROAD_Appraisal_Slide_Images_Soffice/slide-19.png", "NEJMoa2412006_BPROAD_Appraisal_Slide_Images_Soffice/slide-20.png", "NEJMoa2412006_BPROAD_Appraisal_Slide_Images_Soffice/slide-21.png", "NEJMoa2412006_BPROAD_Appraisal_Slide_Images_Soffice/slide-22.png", "NEJMoa2412006_BPROAD_Appraisal_Slide_Images_Soffice/slide-23.png", "NEJMoa2412006_BPROAD_Appraisal_Slide_Images_Soffice/slide-24.png", "NEJMoa2412006_BPROAD_Appraisal_Slide_Images_Soffice/slide-25.png", "NEJMoa2412006_BPROAD_Appraisal_Slide_Images_Soffice/slide-26.png", "NEJMoa2412006_BPROAD_Appraisal_Slide_Images_Soffice/slide-27.png", "NEJMoa2412006_BPROAD_Appraisal_Slide_Images_Soffice/slide-28.png", "NEJMoa2412006_BPROAD_Appraisal_Slide_Images_Soffice/slide-29.png", "NEJMoa2412006_BPROAD_Appraisal_Slide_Images_Soffice/slide-30.png", "NEJMoa2412006_BPROAD_Appraisal_Slide_Images_Soffice/slide-31.png", "NEJMoa2412006_BPROAD_Appraisal_Slide_Images_Soffice/slide-32.png", "NEJMoa2412006_BPROAD_Appraisal_Slide_Images_Soffice/slide-33.png", "NEJMoa2412006_BPROAD_Appraisal_Slide_Images_Soffice/slide-34.png", "NEJMoa2412006_BPROAD_Appraisal_Slide_Images_Soffice/slide-35.png", "NEJMoa2412006_BPROAD_Appraisal_Slide_Images_Soffice/slide-36.png", "NEJMoa2412006_BPROAD_Appraisal_Slide_Images_Soffice/slide-37.png", "NEJMoa2412006_BPROAD_Appraisal_Slide_Images_Soffice/slide-38.png", "NEJMoa2412006_BPROAD_Appraisal_Slide_Images_Soffice/slide-39.png", "NEJMoa2412006_BPROAD_Appraisal_Slide_Images_Soffice/slide-40.png", "NEJMoa2412006_BPROAD_Appraisal_Slide_Images_Soffice/slide-41.png", "NEJMoa2412006_BPROAD_Appraisal_Slide_Images_Soffice/slide-42.png", "NEJMoa2412006_BPROAD_Appraisal_Slide_Images_Soffice/slide-43.png"];
    const image = document.getElementById('slideImage');
    const counter = document.getElementById('counter');
    const prev = document.getElementById('prev');
    const next = document.getElementById('next');
    const slider = document.getElementById('slider');
    const number = document.getElementById('number');
    const stage = document.getElementById('stage');
    let current = 0;
    let touchStartX = null;

    function clamp(idx) {
      return Math.max(0, Math.min(slides.length - 1, idx));
    }

    function preload(idx) {
      if (idx < 0 || idx >= slides.length) return;
      const img = new Image();
      img.src = slides[idx];
    }

    function show(idx, updateHash = true) {
      current = clamp(idx);
      image.src = slides[current];
      image.alt = `Slide ${current + 1}`;
      counter.textContent = `${current + 1} / ${slides.length}`;
      prev.disabled = current === 0;
      next.disabled = current === slides.length - 1;
      slider.value = String(current + 1);
      number.value = String(current + 1);
      preload(current + 1);
      preload(current - 1);
      if (updateHash) history.replaceState(null, '', `#slide-${current + 1}`);
    }

    prev.addEventListener('click', () => show(current - 1));
    next.addEventListener('click', () => show(current + 1));
    document.getElementById('leftHit').addEventListener('click', () => show(current - 1));
    document.getElementById('rightHit').addEventListener('click', () => show(current + 1));
    slider.addEventListener('input', () => show(Number(slider.value) - 1));
    number.addEventListener('change', () => show(Number(number.value) - 1));
    document.getElementById('fullscreen').addEventListener('click', async () => {
      if (!document.fullscreenElement) await document.documentElement.requestFullscreen();
      else await document.exitFullscreen();
    });

    document.addEventListener('keydown', (event) => {
      if (['ArrowRight', 'PageDown', ' '].includes(event.key)) {
        event.preventDefault();
        show(current + 1);
      }
      if (['ArrowLeft', 'PageUp'].includes(event.key)) {
        event.preventDefault();
        show(current - 1);
      }
      if (event.key === 'Home') show(0);
      if (event.key === 'End') show(slides.length - 1);
    });

    stage.addEventListener('touchstart', (event) => {
      touchStartX = event.changedTouches[0].clientX;
    }, { passive: true });
    stage.addEventListener('touchend', (event) => {
      if (touchStartX === null) return;
      const dx = event.changedTouches[0].clientX - touchStartX;
      if (Math.abs(dx) > 45) show(current + (dx < 0 ? 1 : -1));
      touchStartX = null;
    }, { passive: true });

    const match = location.hash.match(/slide-(\d+)/);
    show(match ? Number(match[1]) - 1 : 0, false);
  </script>
</body>
</html>
